<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spotify - Pagina Artista</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <style>
      body,
      html,
      main {
        height: 100%;
        background-color: black;
        color: white;
      }

      /* Main */
      #main-content {
        flex-grow: 1;
        background-color: #121212;
        overflow-y: auto;
      }

      /*lo scroll*/
      .custom-scroll::-webkit-scrollbar {
        width: 10px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
      }

      .hover-riga:hover {
        background-color: rgba(255, 255, 255, 0.1);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <a class="navbar-brand p-0" href="./home-page.html">
            <!--  <img
              src="./assets/imgs/logo.svg"
              alt="logo-spotify
              
              "
          /> --><i class="bi bi-spotify text-light fs-1"></i
          ></a>
          <button
            class="navbar-toggler text-light"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span><i class="bi bi-list fs-1"></i></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul
              class="navbar-nav me-auto mb-2 mb-lg-0 d-flex align-items-center align-items-sm-start gap-3"
            >
              <li class="nav-item">
                <a href="./home-page.html" class="text-light border-1">
                  <i
                    class="bi bi-house-door-fill fs-4 px-2 px-2 pb-1 rounded rounded-circle bg-secondary"
                  ></i>
                </a>
              </li>
              <form
                class="d-flex text-light btn-group border border-1 rounded-5"
                role="search"
              >
                <button
                  type="button"
                  class="btn text-light w-auto"
                  id="search-btn"
                >
                  <i class="bi bi-search"></i>
                </button>
                <div class="container-fluid d-flex justify-content-center">
                  <div class="search-box">
                    <div
                      class="d-flex align-items-center bg-dark rounded-pill px-3"
                      style="height: 40px"
                    >
                      <input
                        id="inputSearch"
                        class="bg-transparent w-auto text-light border-0 w-100"
                        type="search"
                        placeholder="Search"
                        aria-label="Search"
                      />
                    </div>
                    <ul id="listaData"></ul>
                  </div>
                </div>

                <button type="button" class="btn">
                  <i class="bi bi-archive text-light"></i>
                </button>
              </form>
            </ul>
            <section
              class="d-flex flex-column flex-md-row align-items-md-center"
            >
              <div
                class="d-flex flex-column flex-md-row align-items-md-center gap-3 border-end border-2 px-0 px-md-3"
              >
                <a href="#" class="text-light fw-bold text-decoration-none">
                  Premium</a
                >
                <a href="#" class="text-light fw-bold text-decoration-none">
                  Support</a
                >
                <a
                  href="#"
                  class="text-light fw-bold text-decoration-none mb-3 mb-md-0"
                  >Download
                </a>
              </div>
              <div
                class="d-flex flex-column flex-md-row align-items-md-center gap-3 px-0 px-md-3"
              >
                <a href="#" class="text-light fw-bold text-decoration-none"
                  ><i class="bi bi-arrow-down-circle-fill"></i> Install App</a
                >
                <a href="#" class="text-light fw-bold text-decoration-none">
                  Sign Up</a
                >
                <button
                  type="button"
                  class="btn text-dark border border-1 bg-light rounded-4 p-2 flex-shrink-1"
                  id="search-btn"
                >
                  <a href="#" class="text-decoration-none fw-bold text-black"
                    >Log in</a
                  >
                </button>
              </div>
            </section>
          </div>
        </div>
      </nav>
      <!-- esempio nav -->
    </header>

    <main
      class="container-fluid p-2 h-100 bg-black d-flex flex-column align-items-center justify-content-start"
      id="main-content"
      class="custom-scroll"
    >
      <form id="createPlaylistForm" class="p-2 m-4" style="width: 50%">
        <div class="mb-3">
          <label for="playlistTitle" class="form-label">Title</label>
          <input
            type="text"
            class="form-control bg-dark text-white border-0 rounded-5"
            id="playlistTitle"
            aria-describedby="emailHelp"
          />
        </div>
        <div class="mb-3">
          <label for="playlistDescription" class="form-label"
            >Description</label
          >
          <input
            type="text"
            class="form-control bg-dark text-white border-0 rounded-5"
            id="playlistDescription"
          />
        </div>
        <div class="mb-3 form-check">
          <input
            type="checkbox"
            class="form-check-input"
            id="playlistPublicCheck"
          />
          <label class="form-check-label" for="playlistPublicCheck"
            >Make this playlist public</label
          >
        </div>
        <button type="submit" class="btn btn-success">Create Playlist</button>
        <button type="button" class="btn btn-dark">Clear</button>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/searchbarSpotify.js"></script>
    <script src="searchbarPaolo/searchbar.js"></script>
  </body>
</html>
