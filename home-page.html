<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spotify - Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
  </head>
  <body style="background-color: black" class="text-light">
    <header>
      <nav class="navbar">
        <div class="container-fluid">
          <div class="d-flex align-items-center px-2 gap-3">
            <a class="navbar-brand bg-success" style="width: 110px">
              <img
                src="./assets/imgs/logo.svg"
                alt="logo-spotify
              
              "
            /></a>
            <a href="./home-page.html" class="text-light border-1">
              <i
                class="bi bi-house-door-fill fs-2 px-2 px-2 pb-1 rounded rounded-circle bg-secondary"
              ></i>
            </a>
            <form
              class="d-flex text-light btn-group border border-1 rounded-5"
              role="search"
            >
              <button type="button" class="btn text-light" id="search-btn">
                <i class="bi bi-search"></i>
              </button>
              <input
                class="bg-black w-auto text-light border-0"
                type="search"
                placeholder="Want do you wanna play?"
                aria-label="Search"
              />
              <button type="button" class="btn">
                <i class="bi bi-archive text-light"></i>
              </button>
            </form>
          </div>
          <section class="d-flex align-items-center">
            <div class="d-flex gap-3 border-end border-2 px-3">
              <a href="#" class="text-light fw-bold text-decoration-none">
                Premium</a
              >
              <a href="#" class="text-light fw-bold text-decoration-none">
                Support</a
              >
              <a href="#" class="text-light fw-bold text-decoration-none"
                >Download
              </a>
            </div>
            <div class="d-flex align-items-center gap-3 px-3">
              <a href="#" class="text-light fw-bold text-decoration-none"
                ><i class="bi bi-arrow-down-circle-fill"></i> Install App</a
              >
              <a href="#" class="text-light fw-bold text-decoration-none">
                Sign Up</a
              >
              <button
                type="button"
                class="btn text-dark border border-1 bg-light rounded-4 p-2"
                id="search-btn"
              >
                <a href="#" class="text-decoration-none fw-bold text-black"
                  >Log in</a
                >
              </button>
            </div>
          </section>
        </div>
      </nav>
    </header>
    <main></main>
    <footer></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
