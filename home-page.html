<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spotify - Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.min.css"
    />
    <style>
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        opacity: 0;
      }
      #range-bar {
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        background: linear-gradient(to right, white 80%, #535353 10%);
        border-radius: 2px;
        min-width: 300px;
        width: 100%;
      }
      #volume-bar {
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        background: linear-gradient(to right, white 80%, #535353 10%);
        border-radius: 2px;
      }
    </style>
  </head>
  <body class="text-light bg-black">
    <header>
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <a class="navbar-brand p-0" href="./home-page.html">
            <!--  <img
              src="./assets/imgs/logo.svg"
              alt="logo-spotify
              
              "
          /> --><i class="bi bi-spotify text-light fs-1"></i
          ></a>
          <button
            class="navbar-toggler text-light"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span><i class="bi bi-list fs-1"></i></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul
              class="navbar-nav me-auto mb-2 mb-lg-0 d-flex align-items-center align-items-sm-start gap-3"
            >
              <li class="nav-item">
                <a href="./home-page.html" class="text-light border-1">
                  <i
                    class="bi bi-house-door-fill fs-4 px-2 px-2 pb-1 rounded rounded-circle bg-secondary"
                  ></i>
                </a>
              </li>
              <form
                class="d-flex text-light btn-group border border-1 rounded-5"
                role="search"
              >
                <button
                  type="button"
                  class="btn text-light w-auto"
                  id="search-btn"
                >
                  <i class="bi bi-search"></i>
                </button>
                <input
                  class="bg-black w-auto text-light border-0 w-100"
                  type="search"
                  placeholder="Want do you wanna play?"
                  aria-label="Search"
                />
                <button type="button" class="btn">
                  <i class="bi bi-archive text-light"></i>
                </button>
              </form>
            </ul>
            <section
              class="d-flex flex-column flex-md-row align-items-md-center"
            >
              <div
                class="d-flex flex-column flex-md-row align-items-md-center gap-3 border-end border-2 px-0 px-md-3"
              >
                <a href="#" class="text-light fw-bold text-decoration-none">
                  Premium</a
                >
                <a href="#" class="text-light fw-bold text-decoration-none">
                  Support</a
                >
                <a
                  href="#"
                  class="text-light fw-bold text-decoration-none mb-3 mb-md-0"
                  >Download
                </a>
              </div>
              <div
                class="d-flex flex-column flex-md-row align-items-md-center gap-3 px-0 px-md-3"
              >
                <a href="#" class="text-light fw-bold text-decoration-none"
                  ><i class="bi bi-arrow-down-circle-fill"></i> Install App</a
                >
                <a href="#" class="text-light fw-bold text-decoration-none">
                  Sign Up</a
                >
                <button
                  type="button"
                  class="btn text-dark border border-1 bg-light rounded-4 p-2 flex-shrink-1"
                  id="search-btn"
                >
                  <a href="#" class="text-decoration-none fw-bold text-black"
                    >Log in</a
                  >
                </button>
              </div>
            </section>
          </div>
        </div>
      </nav>
      <!-- esempio nav -->
    </header>
    <main>
      <div
        id="audio-player"
        class="bg-black position-fixed bottom-0 w-100 d-flex justify-content-between p-3"
      >
        <div class="song-title d-flex align-items-center gap-2">
          <img
            src="./assets/imgs/main/image-12.jpg"
            alt=""
            style="width: 50px"
          />
          <div class="">
            <h4 class="m-0 fs-5">Titlolo brano</h4>
            <p class="m-0 fs-6">Artista brano</p>
          </div>
          <div class="ms-2">
            <i class="bi bi-heart fs-4"></i>
          </div>
        </div>
        <div class="player-control d-flex flex-column justify-self-center">
          <div id="control-btns" class="d-flex justify-content-center">
            <button class="border-0 bg-transparent text-light">
              <i class="fs-4 bi bi-shuffle"></i>
            </button>
            <button class="border-0 bg-transparent text-light">
              <i class="fs-4 bi bi-skip-start-fill"></i>
            </button>
            <button class="border-0 bg-transparent text-light">
              <i class="fs-1 bi bi-play-circle-fill"></i>
            </button>
            <button class="border-0 bg-transparent text-light">
              <i class="fs-4 bi bi-skip-end-fill"></i>
            </button>
            <button class="border-0 bg-transparent text-light">
              <i class="fs-4 bi bi-repeat"></i>
            </button>
          </div>
          <div id="time-bar">
            <div class="d-flex align-items-center gap-2">
              <span class="text-secondary small">123</span>
              <input type="range" id="range-bar" />
              <span class="text-secondary small">123</span>
            </div>
          </div>
        </div>
        <div class="volume d-flex align-items-center gap-1">
          <button class="border-0 bg-transparent text-light">
            <i class="fs-5 bi bi-mic"></i>
          </button>
          <button class="border-0 bg-transparent text-light">
            <i class="fs-5 bi bi-menu-button-wide-fill"></i>
          </button>
          <button class="border-0 bg-transparent text-light">
            <i class="fs-5 bi bi-music-player"></i>
          </button>
          <div class="d-flex align-items-center gap-1">
            <label for="">
              <i class="fs-5 bi bi-volume-up"></i>
            </label>
            <input type="range" id="volume-bar" />
          </div>
          <button class="border-0 bg-transparent text-light">
            <i class="bi bi-arrows-angle-expand"></i>
          </button>
        </div>
      </div>
    </main>
    <footer></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
