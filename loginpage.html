<!doctype html>
<html lang="it">
  <head>
    <title>LogIn Page</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background-color: #000000;
        color: white;
        height: 100vh;
      }

      .login-card {
        background-color: #121212;
        padding: 40px;
        border-radius: 8px;
      }

      .form-control {
        background-color: #121212;
        border: 1px solid #727272;
        color: white;
      }

      .form-control:focus {
        background-color: #2a2a2a;
        color: white;
        border-color: #1db954;
        box-shadow: none;
      }

      .btn-login {
        background-color: #1db954;
        border: none;
        color: black;
        font-weight: bold;
        border-radius: 50px;
        padding: 12px;
      }
      .form-control:focus::placeholder {
        color: #1db954;
        transition: color 0.3s ease;
      }
      .login-card:hover .form-control {
        border-color: #ffffff;
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>

  <body>
    <main class="container h-100">
      <div class="row h-100 align-items-center justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
          <div class="text-center mb-4">
            <i class="bi bi-spotify text-light display-1"></i>
          </div>

          <div class="login-card shadow">
            <h1 class="text-center h3 fw-bold mb-4">Che bello rivederti !</h1>

            <form>
              <div class="mb-4">
                <label for="email" class="form-label small fw-bold fs-5"
                  >E-mail
                </label>
                <input
                  type="email"
                  class="form-control py-2"
                  id="email"
                  placeholder="  "
                />
              </div>

              <button type="submit" class="btn btn-login w-100">Avanti</button>
              <p class="text-center mt-2">oppure</p>

              <button
                type="button"
                class="btn btn-outline-dark ms-auto text-light w-100 rounded-pill d-flex align-items-center justify-content-center py-2 mb-3 fw-bold"
                data-bs-toggle="modal"
                data-bs-target="#googleModal"
              >
                <i class="bi bi-google text-warning me-2 fs-4"></i>
                Continua con Google
              </button>
              <button
                type="button"
                class="btn btn-outline-dark ms-auto text-light w-100 rounded-pill d-flex align-items-center justify-content-center py-2 mb-3 fw-bold"
              >
                <i class="bi bi-facebook me-2 text-primary fs-4"></i>
                Continua con Facebook
              </button>
              <button
                type="button"
                class="btn btn-outline-dark ms-auto text-light w-100 rounded-pill d-flex align-items-center justify-content-center py-2 fw-bold"
              >
                <i class="bi bi-apple me-4 fs-4"></i>
                Continua con Apple
              </button>
            </form>

            <hr class="my-4 border-secondary" />

            <div class="text-center">
              <p class="text-secondary small mb-1">Non hai un account?</p>
              <a
                href="./registrazione.html"
                target="_blank"
                class="text-white fw-bold text-decoration-none"
                >Iscriviti</a
              >
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="row h-100 align-items-center justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
          <div class="text-center mb-4 mt-5 ms-auto">
            <p>
              Questo sito è protetto da reCAPTCHA e si applica informativa sulla
              privacy e i termini di servizio di Google.
            </p>
          </div>
        </div>
      </div>
    </footer>
    <div
      class="modal fade"
      id="googleModal"
      tabindex="-1"
      aria-labelledby="googleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div
          class="modal-content bg-light text-dark border-secondary shadow-lg"
          style="border-radius: 15px"
        >
          <div class="modal-header border-0 pb-0">
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body text-center p-4">
            <h5 class="fw-bold mb-3 text-dark fs-3" id="googleModalLabel">
              Nessun account Spotify trovato
            </h5>

            <p class="text-secondary small mb-4 text-dark">
              L'account Google non è collegato a un profilo Spotify esistente.
            </p>

            <div class="vstack gap-2">
              <button
                type="button"
                class="btn btn-success rounded-pill fw-bold py-2 border-dark text-dark"
              >
                Accedi in un altro modo
              </button>
              <button
                type="button"
                class="btn btn-outline-light rounded-pill fw-bold py-2 text-dark border-dark"
                data-bs-dismiss="modal"
              >
                Iscriviti
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
