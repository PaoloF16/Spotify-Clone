<!doctype html>
<html lang="it">
  <head>
    <title>SignUp Page</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background: #152331; /* fallback for old browsers */
        background: -webkit-linear-gradient(
          to top,
          #000000,
          #152331
        ); /* Chrome 10-25, Safari 5.1-6 */
        background: linear-gradient(to top, #000000, #152331);
        color: white;
        height: 100vh;
      }

      .login-card {
        background-color: #121212;
        padding: 40px;
        border-radius: 8px;
      }

      .form-control {
        background-color: #121212;
        border: 1px solid #727272;
        color: white;
      }

      .form-control:focus {
        background-color: #2a2a2a;
        color: white;
        border-color: #1db954;
        box-shadow: none;
      }

      .btn-login {
        background-color: #1db954;
        border: none;
        color: black;
        font-weight: bold;
        border-radius: 50px;
        padding: 12px;
      }

      .form-control:focus::placeholder {
        color: #1db954;
        transition: color 0.3s ease;
      }
      .login-card:hover .form-control {
        border-color: #ffffff;
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>

  <body>
    <main class="container h-100">
      <div class="row h-100 align-items-center justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
          <div class="text-center mb-4 mt-4">
            <i class="bi bi-spotify text-light display-1"></i>
          </div>

          <div class="login-card shadow">
            <h1 class="text-center h3 fw-bold mb-4 fs-1">
              Iscriviti per iniziare ad ascoltare!
            </h1>

            <form>
              <div class="mb-4">
                <label for="email" class="form-label small fw-bold fs-5"
                  >Indirizzo e-mail
                </label>
                <input
                  type="email"
                  class="form-control py-2 text-secondary border-light"
                  id="email"
                  placeholder=" nome@dominio.com "
                />
              </div>

              <button type="submit" class="btn btn-login w-100">
                Continua
              </button>
              <p class="text-center mt-2">oppure</p>

              <button
                type="button"
                class="btn btn-outline-dark ms-auto text-light w-100 rounded-pill d-flex align-items-center justify-content-center py-2 mb-3 fw-bold"
                data-bs-toggle="modal"
                data-bs-target="#googleModal"
              >
                <i class="bi bi-google text-warning me-2 fs-4"></i>
                Iscriviti con Google
              </button>

              <button
                type="button"
                class="btn btn-outline-dark ms-auto text-light w-100 rounded-pill d-flex align-items-center justify-content-center py-2 fw-bold"
              >
                <i class="bi bi-apple me-4 fs-4"></i>
                Iscriviti con Apple
              </button>
            </form>

            <hr class="my-4 border-secondary" />

            <div class="text-center">
              <p class="text-secondary small mb-1">Hai già un account?</p>
              <a
                href="./registrazione.html"
                target="_blank"
                class="text-white fw-bold text-decoration-none"
                >Accedi</a
              >
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div
        class="row h-100 align-items-center justify-content-center pt-5 bg-black"
      >
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
          <div class="text-center mb-4 mt-5 ms-auto">
            <p>
              This site is protected by reCAPTCHA and the Google Privacy Policy
              and Terms of Service apply.
            </p>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
