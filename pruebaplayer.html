<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="embed-iframe"></div>

    <div style="margin-top: 16px">
      <button id="playBtn">Play</button>
      <button id="pauseBtn">Pause</button>
      <button id="trackBtn">Cargar otra canción</button>
    </div>
    <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
    <script>
      let embedController = null;

      window.onSpotifyIframeApiReady = (IFrameAPI) => {
        const element = document.getElementById("embed-iframe");

        const options = {
          width: "100%",
          height: "152",
          uri: "spotify:track:4uLU6hMCjMI75M1A2tKUQC", // canción inicial
        };

        const callback = (controller) => {
          embedController = controller;

          document.getElementById("playBtn").addEventListener("click", () => {
            embedController.play();
          });

          document.getElementById("pauseBtn").addEventListener("click", () => {
            embedController.pause();
          });

          document.getElementById("trackBtn").addEventListener("click", () => {
            embedController.loadUri("spotify:track:1301WleyT98MSxVHPZCA6M");
          });
        };

        IFrameAPI.createController(element, options, callback);
      };
    </script>
  </body>
</html>

<!-- progress bar js  -->
<div class="progress">
  <div class="progress-bar" id="bar"></div>
</div>

<button onclick="avanzar()">Avanzar</button>

<style>
  .progress {
    width: 100%;
    height: 20px;
    background: #eee;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: green;
    transition: width 0.3s;
  }
</style>

<script>
  let progreso = 0;

  function avanzar() {
    if (progreso < 100) {
      progreso += 10;
      document.getElementById("bar").style.width = progreso + "%";
    }
  }
</script>
<input type="range" id="progress" value="0" min="0" max="100" />

<script>
  const progress = document.getElementById("progress");

  // simular avance
  setInterval(() => {
    progress.value += 1;
    if (progress.value >= 100) progress.value = 0;
  }, 1000);
</script>
